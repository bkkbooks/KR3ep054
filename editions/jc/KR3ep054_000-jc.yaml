body:
  text: 一崩漏案天癸應去不去而妄行血塊有由漏而崩之狀東洋參一錢五分酸棗仁二錢貢阿膠蒲黃炒一錢廣橘皮絡各一錢五分雲茯苓三錢樗根白皮三錢地榆炭三錢杭白芍三錢大艾葉七分當歸身一錢五分乾地黃三錢炙甘草五分芙蓉花一錢五分陳棕炭一錢肝脾既不統藏任帶又疏約束天癸妄行有塊腹痛作噦穀食減少脈象弦細而數再延有崩漏之漸煨大白芍一兩炙甘草一錢製半夏三錢雲茯苓神各三錢木芙蓉一錢五分西琥珀研細和服三分須穀芽三錢又加伏龍肝一兩雞內金三具本證稍解吸受新涼身熱不清擬方速解為要粉葛根一錢五分杏仁二錢廣橘皮絡各八分製半夏三錢雲茯苓三錢煨大白芍二錢炙甘草一錢枇杷葉一片再診製半夏四錢蔞仁霜八分煅赭石三錢木茯苓神各三錢廣橘皮絡各七分伏龍肝一兩五錢兩日一服十三帖丸方乾地黃三兩老生薑一兩五錢煨大白芍三兩炙甘草五錢製半夏三兩雲茯苓神各一兩五錢廣橘皮絡各四錢上肉桂去粗皮二錢五分地榆炭二兩上藥地黃泡取汁生薑搗取汁以二汁互炒二渣共研細末用拒霜花三兩煎湯疊丸每早三錢開水下案天癸並月而崩已延月餘刻加外感致氣痞舉發寒熱不清攻衝作痛穀食不思此乃病上加病非佳兆也廣藿香粉葛根製半夏川樸花香附米川鬱金前胡防風廣橘皮木茯苓神甘草降香屑外邪已解惟氣痞未平胃氣未和血崩未止擬方治之廣橘皮製半夏焦於術南木香建曲麥穀芽雲茯苓神香附米砂仁殼佩蘭葉陳米飯青荷葉包燒外婦寶丹氣痞已平血崩已止惟人虛易感風邪寒熱咳逆穀食不香擬方仍冀速解前胡防風蘇莖子杏仁桔梗甘草製半夏廣橘紅雲茯苓神葛根枇杷葉二濕溫案濕溫月餘瀰漫三焦身熱不清耳聾面瘦結胸自利脈息弦數深慮正不敵邪致生歧變擬方以盡人力杏仁白蔻仁後下製半夏雅連頭乾薑廣橘皮川貝母黃鬱金赤苓枇杷葉鐵鏽水生薑汁外用巴豆仁一粒雅連薑汁炒十三寸共搗如泥用棗漿和勻作餅約如棋十枚大每用一枚置臍上以蘄艾小團灸壯不計數以熱不可耐為度案濕溫結胸自利身熱未清脈象細濡已五候有餘深慮正不敵邪外生枝節擬方獲效乃吉制附片一錢製半夏一錢五分雅連姜水炒五分乾薑四分炒黃鬱金一錢五分川樸頭五分新會皮八分雲茯苓三錢六和曲二錢鐵鏽水五匙和服又加葛根八分再診製半夏雅連頭乾薑廣橘皮川樸頭黃鬱金六和曲雲茯苓苦杏仁白蔻仁鐵鏽水生薑汁外用巴豆仁黃連棗漿為餅置臍上用艾團灸之不計壯數以腹中熱不可耐為度案濕溫延經月餘寒少熱多胸次不開脈象滑數深慮正不敵邪致生枝節擬方獲效為順粉葛根杏仁製半夏川鬱金雲茯苓白蔻仁廣橘皮大貝母川通草大白芍炒六曲枇杷葉甘露散二診春柴胡六分粉甘草四分廣橘皮絡各八分川通草三分桂枝六分大白芍一錢五分杏仁一錢五分白蔻仁七分法半夏二錢雲茯苓三錢枇杷葉二片案產後百脈空虛濕溫瀰漫三焦將近一月右邊發頤向來肝鬱不伸濕痰內擾所以穀食不進脈象弦細而滑深慮外脫之虞杏仁白蔻仁廣橘皮絡製半夏香蘇莖川鬱金赤苓川通草滌飲散枇杷葉案濕溫後肝木乘脾水濕困中脘腹膨脹而大脈象弦澀再延有脹滿之慮橘皮絡茯苓皮腹皮絨澤瀉蘇莖烏扇川鬱金製半夏防己樸頭附片五加皮通絡散案濕溫五候有餘身熱不清白㾦現而未透舌苔白滑渴不多飲甚則作嘔咳脈來濡數慮其正不勝邪致生歧變擬方獲效乃吉葛根杏仁白蔻仁新會皮製半夏瓜蔞皮大貝母雲茯苓六和曲川樸川鬱金川通草枇杷葉伏龍肝案濕溫愈而復反身熱神糊白㾦外現胸次結痞擬方獲效乃妙粉葛根製半夏乾薑雅連頭杏仁白蔻仁廣藿香川鬱金新會皮川通草枇杷葉生薑汁三匙和服鐵鏽水五匙和服案濕溫愈而復反神糊身熱白㾦現而未透擬方盡力圖之製半夏乾薑川連頭川樸川鬱金杏仁白蔻仁粉葛根新會皮川通草生薑汁鐵鏽水案先後天不足濕溫結胸自利月餘不解加之濕痰入絡左腿痹痛伸屈不利脈息弦數慮其正不勝邪致生歧變擬方獲效乃吉木防己川通草製半夏柴胡六和曲澤瀉葛根蘇莖白芥子川鬱金廣橘皮絡生薑汁鐵鏽水身熱已解結胸漸開擬方再能應手可高枕也製半夏乾薑上雅連廣橘紅絡川鬱金雲茯苓白蔻衣砂仁衣冬瓜仁案濕溫九日身熱下利白㾦現而未透脈象細濡深慮化熱逆傳杏仁白蔻仁新會皮川樸粉葛根製半夏大貝母川鬱金六和曲赤苓枇杷葉濕溫鬱而不伸寒熱多日不清白㾦未透脈息細濡舌苔底白罩灰乃水極似火證也謹防昏陷製半夏附片炮姜杏仁白蔻仁川鬱金大貝母制南星煅礞石童便赤苓鮮杷葉三濕痰案肝木乘脾濕痰內困遂令脘腹膨大穀食減少脈象弦細面浮肢腫再延防成脹滿溫中化飲法案肝木乘脾濕痰互結中宮胸次結痞肝陽上升頭目眩暈脈象弦濡擬方徐圖之天麻二陳加通絡化飲之品案肝旺膽虛濕痰入絡虛陽上升於是心悸頭眩耳鳴懊憹難名間有嗆咳驚悸麻痹善怯多疑脈息弦滑右脈反關左脈獨見擬方善圖方可漸入佳境煅磁石瓜蔞霜半夏粉木防己九制於術木茯神白蒺藜廣橘皮絡荷筋瓦楞子路路通八楞麻苦竹根絡石藤首烏藤案肝木侮土濕痰困中少腹膨脹而大脈象沉弦再延防成氣臌煨木香制附片川樸製半夏茯苓皮香蘇莖新會皮青皮絡香櫞皮大腹皮五加皮巴豆皮逐飲散外厚朴溫中丸一錢五分局方四七丸一錢五分琥珀外臺丸三分開水下案肝木乘脾濕痰內伏遂令脘腹兩脅脹膨已延三年之久脈象沉弦宜遠煩戒怒為要製半夏木防己通絡散淡姜渣川鬱金廣橘皮絡雲茯苓白蔻仁川樸花砂仁殼香櫞皮又加薤白頭三錢蔞皮二錢熟附片七分再診茯苓皮桂枝木逐飲散附片五加皮大腹皮川樸香蘇莖澤瀉木防己廣橘皮絡香櫞皮又加砂仁殼一錢五分上肉桂四分開口川椒二分炒又加香附米一錢五分宣木瓜一錢五分巴豆衣一錢五分十九帖每三六九服一帖丸方雲茯苓神各一兩五錢廣橘皮絡鹽水炒各八錢半夏粉一兩五錢絡石藤七錢霜桑葉八錢粉丹皮一兩五錢蔞霜一兩五錢川貝母一兩五錢香蘇莖一兩五錢天仙藤七錢路路通八錢甜瓜瓣一兩五錢粉甘草四錢上為末用苦竹根七錢絲瓜絡一條地骨皮四兩煎湯疊丸川椒子大每服三錢開水下案肝木乘脾濕痰互結致成痞塊任帶不調經頻帶下內熱熏灼間或作噦脈弦數擬方緩圖之木茯神製半夏冬桑葉粉丹皮苦竹根黃鬱金粉甘草福橘皮絡香蘇莖蔞霜絡石藤赭石雞內金十五貼三日一服用枸杞根露佛手露各二兩燉溫過口案肝腎血水兩虧不能涵養筋脈故令左肢不遂脈沉小加以水火不交擬方善圖之仙鶴草二兩雄雞左翅血抹炒絡石藤八錢苦竹根六錢路路通五錢牽正散五錢嫩桑枝二斤酒浸一夜半夏粉一兩五錢明天麻一兩鹿銜草一兩五錢川木瓜二兩桂枝木五錢廣橘皮絡各五錢千年健八錢天仙藤一兩雲茯苓神各一兩五錢上用清河水熬取原汁加白蜜四兩走馬胎膏四兩衛生膏三兩收膏每三錢開水和服案肝木乘脾濕痰內伏虛陽上升於是胸次不開頭目旋運其則噦吐涎沫食少神疲脈沉弦而滑擬方徐圖之雲茯苓一兩四制於術三錢橘皮絡各八錢木防己一兩明天麻一兩香蘇莖八錢製半夏一兩五錢白蔻花一兩五錢白蒺藜一兩五錢砂仁殼一兩五錢黃鬱金一兩雞內金二十具八楞麻一兩五錢上為末用荷筋三兩佩蘭葉一兩共煎湯疊丸每服三錢開水下案濕痰入絡左腿痹痛起於五月不能步履再延防痿桂枝木防己牛膝宣木瓜茯苓枳實製半夏橘皮絡風化硝路路通通絡散絡石藤千年健走馬胎膏又加海風藤油松節外用蔥一兩姜一兩木瓜二兩蘇葉一兩五錢煎湯熏洗案素本體半氣虛多濕多痰加以肝鬱乘肺膺胸痹悶久矣數日前胃逆上升氣逆血流動輒盈碗脈息尚幸沉細防湧脫薤白頭二錢陳蔞皮二錢活慈石四錢沉水黑蘇子三分木茯神三錢元武版一兩五錢廣橘絡八分川貝母三錢血見愁二錢枇杷葉三錢白茅花一錢五分苦竹根七分珍珠母三錢案素本肝脾不和濕痰入絡胸次嘈雜心悸頭眩加之熱蘊於曲腸致成赤白滯下成片腹痛脈象虛滑法當先治其標粉葛根大白芍炙甘草川樸花雲茯苓製半夏防己橘皮絡大貝母砂仁殼通絡散雞內金荷蒂案氣滯血瘀濕痰互結心腹瘕聚已延二十五年今夏因肝鬱而作瘧痢疊見腹中脘脅作痛漉漉有聲穀食減少脈象弦細而緊痛甚防厥鮮薤白頭製半夏雲茯苓防己旋覆花通絡散宣木瓜黃鬱金廣橘皮絡降香屑絡石藤四懸飲案向有懸飲加以肝木侮土脾胃交虧命火不能上升心悸懊憹噦吐涎沫脘左作痛近來水飲不能下輸膀胱以致脘次膨脹而大足跗亦腫小水不利食少神疲脈象沉弦而滑再延防成氣臌擬方力圖之烏頭製為末上肉桂去粗皮研末木防己研末用米飯為丸先服川樸頭茯苓皮廣橘皮絡滌飲散製半夏香櫞皮冬瓜仁皮香蘇莖大腹皮川萆薢復診茯苓皮防己新會皮川樸頭澤瀉大腹皮制烏頭製半夏冬瓜皮青皮絡煨木香上肉桂香櫞皮後加巴豆衣一錢黃鬱金一錢五分又加蟾蜍皮一錢五分焙開口川椒十五粒炒調治以來病勢漸減惟症實氣虛不能日服煎劑茲擬丸方次第服之屏煩戒怒為要蟾蜍皮煨木香制烏頭桂枝木茯苓皮澤瀉青皮絡川樸頭香櫞皮冬瓜皮九制於術新會皮巴豆衣製半夏一雞矢白酒每服三兩二濟生腎氣丸每服三錢三禹餘糧丸每服二錢五分四香積丸每服二錢每早開水下案飲邪入絡名曰懸飲脘脅前後心痹痛漉漉有聲時作時止脈象沉弦而滑擬方緩圖之天仙藤製半夏開口吳萸宣木瓜雲茯苓防己絲瓜絡絡石藤通絡散福橘皮絡後加蔞霜薤白頭夜交藤五少腹痛案肝木侮土氣滯寒凝少腹作痛痛甚噦吐食入反出大便秘塞已作三次脈象沉弦擬方徐圖之獨角蜣螂八分九制於術二分五薑汁炒半夏二錢老吳萸三分制附片八分木防己八分雞谷袋三具廣橘皮絡各八分木茯苓神各三錢白蔻衣一錢五分絡石藤五分巴豆衣一錢五分省頭草一錢秫秫米一錢五分復診加天仙藤通絡散絲瓜絡淡姜渣烏飯子減於朮白蔻衣絡石藤茯神省頭草秫秫米再診獨角蜣螂一錢酒炒制附片八分肉桂子七分研巴豆衣一錢五分福橘皮絡各八分製半夏三錢雲茯苓三錢通絡散二分五炙蘇莖一錢五分防己八分蔞霜一錢炒雞內金三具皂角子七枚淡姜渣七分丸方獨角蜣螂一兩五錢老吳萸七錢制烏頭一兩五錢皂莢子五十枚甜瓜子二兩五錢雲茯苓神各二兩白蔻衣一兩五錢省頭草七錢廣橘皮絡各八錢製半夏二兩滌飲散二錢五分漢防己八錢烏飯葉一兩五錢雞內金三十具巴豆衣一兩五錢絡石藤一兩五錢上為末用絲瓜絡一兩五錢方內皂子五十粒共煎湯疊丸如川椒子大每早三錢晚一錢五分開水下六眩暈案肝陽化風上騰清竅飲邪入胃脘次左右作痛甚則噦吐兩肋有形心悸頭眩肉瞤筋惕脈象弦滑擬方緩圖製半夏川樸花木防己通絡散明天麻野於術廣橘皮絡雲茯苓黃鬱金白蒺藜瓜蔞霜荷筋案肝陽化風痰飲入絡擾亂上升於是目眩頭暈噦吐並見書云無風不眩無痰不暈此之謂也脈弦滑擬方緩圖之白蒺藜八楞麻蔞霜川貝母明天麻靈磁石珍珠母瓦楞子廣橘紅絡製半夏粉甘草省頭草荷筋雲茯苓末藥方高麗參杭菊花野於術牡蠣防風桂